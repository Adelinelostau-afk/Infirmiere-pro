<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfirmièrePro – Diagramme de Soins</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    input, select, textarea, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const { useState, useEffect, useRef } = React;

// ─── Structure officielle du Diagramme de Soins Infirmiers (Sniil 974) ────────
const CATEGORIES_SOINS = [
  {
    id: "hygiene", label: "HYGIÈNE", color: "#2D6A8F",
    soins: [
      "Toilette au lit", "Douche", "Aide à la toilette",
      "Prévention d'escarre", "Capiluve", "Pédiluve",
      "Rasage", "Soin de bouche", "Protection / Change",
    ],
  },
  {
    id: "confort", label: "CONFORT & SÉCURITÉ", color: "#5B8FA8",
    soins: ["Changement de position", "Réfection lit", "Pose de bas contention"],
  },
  {
    id: "locomotion", label: "LOCOMOTION", color: "#3D7A6B",
    soins: [
      "Aide partielle ou totale", "Transfert, déambulateur",
      "Mise au fauteuil", "Lever / coucher",
    ],
  },
  {
    id: "elimination", label: "ÉLIMINATION", color: "#7B6DAA",
    soins: [
      "Selles", "Aide bassin, urinal, WC", "Étui pénien",

  },
  {
    id: "alimentation", label: "ALIMENTATION", color: "#C07A3A",
    soins: ["Complément nutritif", "Poids", "Hydratation"],
  },
  {
    id: "technique", label: "TECHNIQUES", color: "#C04B4B",
    soins: [
      "Préparation TTT", "Administration TTT",
      "Pouls / TA", "Soutien psychologique", "Pansement",
    ],
  },
];

const MOMENTS = [
  { key: "M", label: "M", full: "Matin" },
  { key: "MS", label: "MS", full: "Midi/Soir" },
];
const PASSAGES = ["M", "MS"];

// ─── Stockage local ───────────────────────────────────────────────────────────
const SK = { users: "dsi_users", patients: "dsi_patients", archived: "dsi_archived", soins: "dsi_soins", session: "dsi_session" };

const defaultAdmin = { id: "admin", login: "admin", password: "Admin123!", role: "admin", nom: "Administrateur", prenom: "" };

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }

// ─── Export PDF ───────────────────────────────────────────────────────────────
function exportPDF(patient, allSoins) {
  const entriesByDate = {};
  allSoins.filter(s => s.patientId === patient.id).forEach(s => {
    if (!entriesByDate[s.date]) entriesByDate[s.date] = [];
    entriesByDate[s.date].push(s);
  });
  const dates = Object.keys(entriesByDate).sort((a, b) => {
    const p = d => d.split("/").reverse().join("-");
    return p(a).localeCompare(p(b));
  });

  const rows = CATEGORIES_SOINS.flatMap(cat =>
    cat.soins.map(soin => ({
      cat: cat.label, soin,
      cells: dates.map(d => {
        const entry = entriesByDate[d]?.find(e => e.categorie === cat.id && e.soin === soin);
        return { M: entry?.M || false, MS: entry?.MS || false };
      })
    }))
  );

  const colWidth = Math.max(40, Math.floor(580 / Math.max(dates.length, 1)));

  const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/>
<title>DSI – ${patient.prenom} ${patient.nom}</title>
<style>
  body { font-family: Arial, sans-serif; font-size: 10px; padding: 16px; color: #111; }
  h1 { font-size: 14px; color: #2D6A8F; border-bottom: 2px solid #2D6A8F; padding-bottom:6px; margin-bottom:12px; }
  .info { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:14px; font-size:10px; }
  .info div { background:#f5f7fa; padding:5px 8px; border-radius:4px; }
  table { width:100%; border-collapse:collapse; margin-bottom:16px; }
  th, td { border:1px solid #bbb; padding:3px 4px; text-align:center; }
  th { background:#2D6A8F; color:white; font-size:9px; }
  .cat-label { background:#e8eef4; color:#2D6A8F; font-weight:700; font-size:9px; text-align:left; padding-left:6px; }
  .soin-label { text-align:left; padding-left:10px; font-size:9px; }
  .ok { color:#2e7d52; font-weight:700; }
  .sig { border:1px solid #bbb; padding:10px; margin-top:12px; border-radius:4px; }
  .footer { margin-top:20px; font-size:8px; color:#888; text-align:center; }
  @page { size: A4 landscape; margin: 10mm; }
  @media print { body { padding:0; } }
</style>
</head><body>
<h1>📋 Diagramme de Soins Infirmiers</h1>
<div class="info">
  <div><b>Patient :</b> ${patient.prenom} ${patient.nom}</div>
  <div><b>Naissance :</b> ${patient.dateNaissance || "—"}</div>
  <div><b>N° SS :</b> ${patient.nss || "—"}</div>
  <div><b>Médecin :</b> ${patient.medecin || "—"}</div>
  <div><b>Téléphone :</b> ${patient.telephone || "—"}</div>
  <div><b>Allergies :</b> ${patient.allergies || "Aucune"}</div>
</div>
<table>
  <thead>
    <tr>
      <th style="width:120px;text-align:left">Soin</th>
      ${dates.map(d => `<th colspan="2" style="width:${colWidth}px">${d}</th>`).join("")}
    </tr>
    <tr>
      <th style="text-align:left">Catégorie</th>
      ${dates.map(() => `<th style="font-size:8px">M</th><th style="font-size:8px">MS</th>`).join("")}
    </tr>
  </thead>
  <tbody>
    ${(() => {
      let html = "";
      let lastCat = "";
      rows.forEach(r => {
        if (r.cat !== lastCat) {
          lastCat = r.cat;
          html += `<tr><td class="cat-label" colspan="${1 + dates.length * 2}">${r.cat}</td></tr>`;
        }
        html += `<tr>
          <td class="soin-label">${r.soin}</td>
          ${r.cells.map(c => `<td class="ok">${c.M ? "✓" : ""}</td><td class="ok">${c.MS ? "✓" : ""}</td>`).join("")}
        </tr>`;
      });
      return html;
    })()}
  </tbody>
</table>
${patient.consentement ? `
<div class="sig">
  <b>Consentement signé le ${patient.dateConsentement}</b><br/>
  <img src="${patient.signature}" style="max-height:60px;margin-top:6px;border:1px solid #ddd;"/>
</div>` : ""}
<div class="footer">Document confidentiel – InfirmièrePro DSI • ${new Date().toLocaleDateString("fr-FR")}</div>
</body></html>`;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

// ─── Signature Canvas ─────────────────────────────────────────────────────────
function SignatureCanvas({ onSave, onCancel }) {
  const ref = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);

  function pos(e, c) {
    const r = c.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }
  function start(e) { e.preventDefault(); drawing.current = true; last.current = pos(e, ref.current); }
  function move(e) {
    e.preventDefault();
    if (!drawing.current) return;
    const c = ref.current; const ctx = c.getContext("2d");
    const p = pos(e, c);
    ctx.beginPath(); ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y); ctx.strokeStyle = "#1A2D3D"; ctx.lineWidth = 2;
    ctx.lineCap = "round"; ctx.stroke(); last.current = p;
  }
  function stop(e) { e.preventDefault(); drawing.current = false; }
  function clear() { const c = ref.current; c.getContext("2d").clearRect(0, 0, c.width, c.height); }

  return (
    <div style={{ background: "#f5f7fa", padding: 16, borderRadius: 10, border: "1.5px solid #2D6A8F" }}>
      <p style={{ fontSize: 13, color: "#5E7A8E", margin: "0 0 10px" }}>
        Le patient signe ci-dessous pour attester son consentement éclairé aux soins :
      </p>
      <canvas ref={ref} width={420} height={140}
        style={{ background: "white", border: "1.5px solid #2D6A8F", borderRadius: 6, cursor: "crosshair", touchAction: "none", display: "block" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={stop} onMouseLeave={stop}
        onTouchStart={start} onTouchMove={move} onTouchEnd={stop}
      />
      <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
        <Btn variant="outline" sm onClick={clear}>Effacer</Btn>
        <Btn variant="accent" sm onClick={() => onSave(ref.current.toDataURL())}>Valider</Btn>
        <Btn variant="ghost" sm onClick={onCancel}>Annuler</Btn>
      </div>
    </div>
  );
}

// ─── Composants UI ─────────────────────────────────────────────────────────────
const C = { pri: "#2D6A8F", priD: "#1E4F6B", priL: "#EBF4FA", acc: "#3D7A6B", accL: "#E6F2EE", dan: "#C04B4B", danL: "#FDEDED", warn: "#C07A3A", warnL: "#FEF3E6", neu: "#F5F7FA", bor: "#D8E2EC", txt: "#1A2D3D", mut: "#5E7A8E", whi: "#FFFFFF" };

function Btn({ children, onClick, variant = "primary", sm, style: sx }) {
  const base = { padding: sm ? "5px 13px" : "9px 20px", borderRadius: 7, fontSize: sm ? 12 : 14, fontWeight: 600, cursor: "pointer", border: "none", transition: "opacity .15s", ...sx };
  const vs = { primary: { background: C.pri, color: "white" }, accent: { background: C.acc, color: "white" }, danger: { background: C.dan, color: "white" }, outline: { background: "white", color: C.pri, border: `1.5px solid ${C.pri}` }, ghost: { background: "transparent", color: C.mut }, };
  return <button onClick={onClick} style={{ ...base, ...(vs[variant] || vs.primary) }}>{children}</button>;
}

function Inp({ value, onChange, type = "text", placeholder, error, rows, style: sx }) {
  const base = { width: "100%", padding: "9px 12px", borderRadius: 7, border: `1.5px solid ${error ? C.dan : C.bor}`, fontSize: 14, color: C.txt, background: "white", boxSizing: "border-box", outline: "none", ...sx };
  if (rows) return <textarea value={value} onChange={onChange} rows={rows} placeholder={placeholder} style={{ ...base, resize: "vertical" }} />;
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={base} />;
}

function Field({ label, children, error }) {
  return (
    <div>
      <label style={{ fontSize: 12, fontWeight: 700, color: C.mut, display: "block", marginBottom: 4, textTransform: "uppercase", letterSpacing: ".4px" }}>{label}</label>
      {children}
      {error && <span style={{ color: C.dan, fontSize: 12 }}>{error}</span>}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [users, setUsers] = useState(() => {
    const s = load(SK.users, []);
    if (!s.find(u => u.id === "admin")) { const all = [defaultAdmin, ...s]; save(SK.users, all); return all; }
    return s;
  });
  const [patients, setPatients] = useState(() => load(SK.patients, []));
  const [archived, setArchived] = useState(() => load(SK.archived, []));
  const [soins, setSoins] = useState(() => load(SK.soins, []));
  const [session, setSession] = useState(() => load(SK.session, null));
  const [view, setView] = useState("dash");
  const [selPatient, setSelPatient] = useState(null);
  const [modal, setModal] = useState(null);

  useEffect(() => { save(SK.users, users); }, [users]);
  useEffect(() => { save(SK.patients, patients); }, [patients]);
  useEffect(() => { save(SK.archived, archived); }, [archived]);
  useEffect(() => { save(SK.soins, soins); }, [soins]);
  useEffect(() => { save(SK.session, session); }, [session]);

  function navTo(v, p = null) { setView(v); setSelPatient(p); setModal(null); }
  function logout() { setSession(null); navTo("dash"); }

  function archivePatient(p) {
    setPatients(prev => prev.filter(x => x.id !== p.id));
    setArchived(prev => [...prev, { ...p, archivedAt: new Date().toLocaleDateString("fr-FR") }]);
    navTo("patients");
  }
  function restorePatient(p) {
    setArchived(prev => prev.filter(x => x.id !== p.id));
    const { archivedAt, ...rest } = p;
    setPatients(prev => [...prev, rest]);
  }

  if (!session) return <Login users={users} onLogin={setSession} />;

  const navItems = [
    { key: "dash", label: "Tableau de bord" },
    { key: "patients", label: "Patients" },
    { key: "archives", label: "Archives" },
    ...(session.role === "admin" ? [{ key: "admin", label: "⚙ Admin" }] : []),
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.neu, fontFamily: "'Segoe UI', system-ui, sans-serif" }}>
      <header style={{ background: C.pri, color: "white", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 24px", height: 58, position: "sticky", top: 0, zIndex: 200, boxShadow: "0 2px 10px rgba(0,0,0,.18)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }}>🏥</span>
          <div>
            <div style={{ fontWeight: 700, fontSize: 15, lineHeight: 1 }}>InfirmièrePro</div>
            <div style={{ fontSize: 10, opacity: .7, letterSpacing: ".5px" }}>DIAGRAMME DE SOINS INFIRMIERS</div>
          </div>
        </div>
        <nav style={{ display: "flex", gap: 4 }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => navTo(n.key)}
              style={{ background: view === n.key ? "rgba(255,255,255,.2)" : "transparent", color: "white", border: "none", padding: "6px 14px", borderRadius: 7, cursor: "pointer", fontSize: 13, fontWeight: view === n.key ? 700 : 400 }}>
              {n.label}
            </button>
          ))}
        </nav>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 12, opacity: .8 }}>{session.prenom} {session.nom}</span>
          <button onClick={logout} style={{ background: "rgba(255,255,255,.15)", color: "white", border: "none", padding: "5px 12px", borderRadius: 7, cursor: "pointer", fontSize: 12 }}>Déconnexion</button>
        </div>
      </header>

      <main style={{ maxWidth: 1140, margin: "0 auto", padding: "24px 20px" }}>
        {view === "dash" && <Dashboard patients={patients} soins={soins} onOpen={p => navTo("fiche", p)} />}
        {view === "patients" && !selPatient && <PatientsList patients={patients} onSelect={p => navTo("fiche", p)} onNew={() => setModal("newPatient")} onArchive={archivePatient} />}
        {view === "fiche" && selPatient && <Fiche patient={selPatient} soins={soins.filter(s => s.patientId === selPatient.id)} session={session} onAddSoin={s => setSoins(p => [...p, s])} onUpdateSoin={u => setSoins(p => p.map(s => s.id === u.id ? u : s))} onExport={() => exportPDF(selPatient, soins)} onBack={() => navTo("patients")} onArchive={() => archivePatient(selPatient)} />}
        {view === "archives" && <Archives archived={archived} soins={soins} onRestore={restorePatient} onExport={p => exportPDF(p, soins)} />}
        {view === "admin" && session.role === "admin" && <Admin users={users} onAdd={u => setUsers(p => [...p, u])} onDelete={id => setUsers(p => p.filter(u => u.id !== id))} />}
      </main>

      {modal === "newPatient" && <ModalNouveauPatient onSave={p => { setPatients(prev => [...prev, p]); setModal(null); navTo("fiche", p); }} onClose={() => setModal(null)} />}
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function Login({ users, onLogin }) {
  const [login, setLogin] = useState(""); const [pwd, setPwd] = useState(""); const [err, setErr] = useState(""); const [show, setShow] = useState(false);
  function go() { const u = users.find(x => x.login === login && x.password === pwd); u ? onLogin(u) : setErr("Identifiants incorrects."); }
  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(140deg, ${C.priD} 0%, ${C.pri} 55%, #4a9cc0 100%)`, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ background: "white", borderRadius: 16, padding: 40, width: 360, boxShadow: "0 20px 60px rgba(0,0,0,.25)" }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 44, marginBottom: 8 }}>🏥</div>
          <div style={{ fontWeight: 700, fontSize: 20, color: C.pri }}>InfirmièrePro</div>
          <div style={{ fontSize: 12, color: C.mut, marginTop: 3 }}>Accès sécurisé – données confidentielles</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Field label="Identifiant"><Inp value={login} onChange={e => setLogin(e.target.value)} placeholder="login" /></Field>
          <Field label="Mot de passe">
            <div style={{ position: "relative" }}>
              <Inp type={show ? "text" : "password"} value={pwd} onChange={e => setPwd(e.target.value)} placeholder="••••••••" style={{ paddingRight: 42 }} />
              <button onClick={() => setShow(!show)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 15, color: C.mut }}>{show ? "🙈" : "👁"}</button>
            </div>
          </Field>
          {err && <div style={{ background: C.danL, color: C.dan, padding: "8px 12px", borderRadius: 7, fontSize: 13 }}>{err}</div>}
          <button onClick={go} onKeyDown={e => e.key === "Enter" && go()} style={{ background: C.pri, color: "white", border: "none", padding: "11px", borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 4 }}>Se connecter</button>
        </div>
        <div style={{ textAlign: "center", fontSize: 11, color: C.mut, marginTop: 18 }}>🔒 Connexion sécurisée – Données RGPD</div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ patients, soins, onOpen }) {
  const today = new Date().toLocaleDateString("fr-FR");
  const todaySoins = soins.filter(s => s.date === today);
  const todayPats = [...new Set(todaySoins.map(s => s.patientId))];
  const actesDone = todaySoins.reduce((n, s) => n + (s.M ? 1 : 0) + (s.MS ? 1 : 0), 0);

  return (
    <div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 14, marginBottom: 22 }}>
        <h2 style={{ margin: 0, color: C.pri, fontSize: 20 }}>Tableau de bord</h2>
        <span style={{ color: C.mut, fontSize: 13 }}>📅 {today}</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(190px, 1fr))", gap: 14, marginBottom: 26 }}>
        {[
          { label: "Patients actifs", val: patients.length, icon: "👤", col: C.pri },
          { label: "Passages aujourd'hui", val: todayPats.length, icon: "🚗", col: C.acc },
          { label: "Actes cochés", val: actesDone, icon: "✅", col: C.warn },
        ].map(s => (
          <div key={s.label} style={{ background: "white", borderRadius: 12, padding: "18px 20px", boxShadow: "0 2px 8px rgba(0,0,0,.06)", borderLeft: `4px solid ${s.col}` }}>
            <div style={{ fontSize: 26, marginBottom: 6 }}>{s.icon}</div>
            <div style={{ fontSize: 30, fontWeight: 700, color: s.col }}>{s.val}</div>
            <div style={{ fontSize: 12, color: C.mut }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ background: "white", borderRadius: 12, padding: 20, boxShadow: "0 2px 8px rgba(0,0,0,.06)" }}>
        <h3 style={{ margin: "0 0 14px", color: C.pri, fontSize: 15 }}>Passages du jour</h3>
        {todayPats.length === 0 ? <p style={{ color: C.mut, fontStyle: "italic", fontSize: 13 }}>Aucun passage enregistré aujourd'hui.</p>
          : todayPats.map(pid => {
            const p = patients.find(x => x.id === pid);
            const ps = todaySoins.filter(s => s.patientId === pid);
            const done = ps.reduce((n, s) => n + (s.M ? 1 : 0) + (s.MS ? 1 : 0), 0);
            const total = ps.length * 2;
            return (
              <div key={pid} onClick={() => p && onOpen(p)}
                style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderRadius: 8, border: `1px solid ${C.bor}`, marginBottom: 7, cursor: "pointer", background: "white", transition: "background .1s" }}
                onMouseEnter={e => e.currentTarget.style.background = C.priL}
                onMouseLeave={e => e.currentTarget.style.background = "white"}>
                <div style={{ fontWeight: 600, color: C.txt }}>{p ? `${p.prenom} ${p.nom}` : "Patient inconnu"}</div>
                <div style={{ fontSize: 12, color: C.mut }}>{done}/{total} actes cochés</div>
              </div>
            );
          })}
      </div>
    </div>
  );
}

// ─── LISTE PATIENTS ───────────────────────────────────────────────────────────
function PatientsList({ patients, onSelect, onNew, onArchive }) {
  const [q, setQ] = useState("");
  const filtered = patients.filter(p => `${p.nom} ${p.prenom}`.toLowerCase().includes(q.toLowerCase()));
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
        <h2 style={{ margin: 0, color: C.pri }}>Patients actifs</h2>
        <Btn onClick={onNew}>+ Nouveau patient</Btn>
      </div>
      <Inp value={q} onChange={e => setQ(e.target.value)} placeholder="🔍 Rechercher…" style={{ marginBottom: 14 }} />
      {filtered.length === 0
        ? <div style={{ textAlign: "center", padding: 60, color: C.mut }}>
            <div style={{ fontSize: 44, marginBottom: 12 }}>👤</div>
            <p>Aucun patient.</p>
            <Btn onClick={onNew}>Créer le premier patient</Btn>
          </div>
        : <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map(p => (
              <div key={p.id} style={{ background: "white", borderRadius: 12, padding: "14px 18px", boxShadow: "0 2px 8px rgba(0,0,0,.06)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div onClick={() => onSelect(p)} style={{ cursor: "pointer", flex: 1 }}>
                  <div style={{ fontWeight: 700, color: C.txt, fontSize: 15 }}>{p.prenom} {p.nom}</div>
                  <div style={{ color: C.mut, fontSize: 12, marginTop: 2 }}>
                    {p.dateNaissance && `Né(e) le ${p.dateNaissance}  •  `}{p.telephone && `📞 ${p.telephone}`}
                  </div>
                  {(p.soinsSelectionnes || []).length > 0 && (
                    <div style={{ marginTop: 6, display: "flex", gap: 5, flexWrap: "wrap" }}>
                      {Object.keys(p.soinsSelectionnes || {}).slice(0, 4).map(cat => (
                        <span key={cat} style={{ background: C.priL, color: C.pri, padding: "2px 8px", borderRadius: 10, fontSize: 10, fontWeight: 600 }}>{cat}</span>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ display: "flex", gap: 8, marginLeft: 14 }}>
                  <Btn variant="outline" sm onClick={() => onSelect(p)}>Ouvrir</Btn>
                  <Btn variant="ghost" sm onClick={() => { if (window.confirm(`Archiver ${p.prenom} ${p.nom} ?`)) onArchive(p); }}>Archiver</Btn>
                </div>
              </div>
            ))}
          </div>
      }
    </div>
  );
}

// ─── FICHE PATIENT ────────────────────────────────────────────────────────────
function Fiche({ patient, soins, session, onAddSoin, onUpdateSoin, onExport, onBack, onArchive }) {
  const [tab, setTab] = useState("diagramme");
  const today = new Date().toLocaleDateString("fr-FR");

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
        <Btn variant="ghost" onClick={onBack}>← Retour</Btn>
        <div style={{ flex: 1 }}>
          <h2 style={{ margin: 0, color: C.pri, fontSize: 19 }}>{patient.prenom} {patient.nom}</h2>
          <span style={{ fontSize: 12, color: C.mut }}>{patient.dateNaissance && `Né(e) le ${patient.dateNaissance}`}</span>
        </div>
        <Btn variant="accent" sm onClick={onExport}>📄 Export PDF</Btn>
        <Btn variant="ghost" sm onClick={() => { if (window.confirm("Archiver ce patient ?")) onArchive(); }}>Archiver</Btn>
      </div>

      <div style={{ display: "flex", gap: 2, borderBottom: `2px solid ${C.bor}`, marginBottom: 20 }}>
        {[["diagramme", "📋 Diagramme des soins"], ["infos", "Informations"], ["consentement", "Consentement"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{ background: "none", border: "none", padding: "9px 16px", cursor: "pointer", fontWeight: tab === k ? 700 : 400, color: tab === k ? C.pri : C.mut, borderBottom: `3px solid ${tab === k ? C.pri : "transparent"}`, fontSize: 13, marginBottom: -2 }}>{l}</button>
        ))}
      </div>

      {tab === "diagramme" && <DiagrammeSoins patient={patient} soins={soins} session={session} onAddSoin={onAddSoin} onUpdateSoin={onUpdateSoin} today={today} />}
      {tab === "infos" && <InfosTab patient={patient} />}
      {tab === "consentement" && <ConsentTab patient={patient} />}
    </div>
  );
}

// ─── DIAGRAMME DES SOINS ──────────────────────────────────────────────────────
function DiagrammeSoins({ patient, soins, session, onAddSoin, onUpdateSoin, today }) {
  const [dateView, setDateView] = useState(today);
  const [showAddDate, setShowAddDate] = useState(false);

  // soins du jour sélectionné
  const daySoins = soins.filter(s => s.date === dateView);

  // toutes les dates avec des soins
  const allDates = [...new Set(soins.map(s => s.date))].sort((a, b) => {
    const p = d => d.split("/").reverse().join("-");
    return p(b).localeCompare(p(a));
  });
  if (!allDates.includes(today)) allDates.unshift(today);

  function findEntry(catId, soin) {
    return daySoins.find(s => s.categorie === catId && s.soin === soin);
  }

  function toggle(catId, soin, passage) {
    const existing = findEntry(catId, soin);
    if (existing) {
      onUpdateSoin({ ...existing, [passage]: !existing[passage] });
    } else {
      onAddSoin({ id: Date.now().toString() + Math.random(), patientId: patient.id, date: dateView, categorie: catId, soin, M: passage === "M", MS: passage === "MS", infirmier: `${session.prenom} ${session.nom}` });
    }
  }

  function isTodayDate(d) { return d === today; }

  return (
    <div>
      {/* Sélecteur de date */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <span style={{ fontWeight: 600, color: C.pri, fontSize: 13 }}>Date :</span>
        {allDates.slice(0, 10).map(d => (
          <button key={d} onClick={() => setDateView(d)} style={{
            padding: "5px 13px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: "none", fontWeight: dateView === d ? 700 : 400,
            background: dateView === d ? C.pri : C.neu, color: dateView === d ? "white" : C.txt,
            boxShadow: dateView === d ? "0 2px 6px rgba(45,106,143,.3)" : "none",
          }}>
            {isTodayDate(d) ? `Aujourd'hui (${d})` : d}
          </button>
        ))}
        {showAddDate
          ? <input type="date" onChange={e => { const d = new Date(e.target.value); if (!isNaN(d)) { const s = d.toLocaleDateString("fr-FR"); setDateView(s); setShowAddDate(false); } }} style={{ padding: "5px 10px", borderRadius: 7, border: `1.5px solid ${C.bor}`, fontSize: 13 }} autoFocus />
          : <button onClick={() => setShowAddDate(true)} style={{ padding: "5px 12px", borderRadius: 20, fontSize: 12, border: `1.5px dashed ${C.bor}`, background: "transparent", cursor: "pointer", color: C.mut }}>+ autre date</button>
        }
      </div>

      {/* Légende */}
      <div style={{ display: "flex", gap: 16, marginBottom: 14, fontSize: 12, color: C.mut }}>
        <span><b style={{ color: C.pri }}>M</b> = Matin</span>
        <span><b style={{ color: C.pri }}>MS</b> = Midi / Soir</span>
        <span>Cliquez sur une case pour cocher/décocher</span>
      </div>

      {/* Tableau DSI */}
      <div style={{ background: "white", borderRadius: 12, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,.06)" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 500 }}>
            <thead>
              <tr style={{ background: C.pri, color: "white" }}>
                <th style={{ padding: "10px 16px", textAlign: "left", fontSize: 13, width: "55%", fontWeight: 700 }}>SOIN</th>
                <th style={{ padding: "10px 12px", textAlign: "center", fontSize: 12, width: "22.5%", borderLeft: `1px solid rgba(255,255,255,.2)` }}>M<br /><span style={{ fontSize: 10, opacity: .7 }}>Matin</span></th>
                <th style={{ padding: "10px 12px", textAlign: "center", fontSize: 12, width: "22.5%", borderLeft: `1px solid rgba(255,255,255,.2)` }}>MS<br /><span style={{ fontSize: 10, opacity: .7 }}>Midi/Soir</span></th>
              </tr>
            </thead>
            <tbody>
              {CATEGORIES_SOINS.map((cat, ci) => (
                <>
                  <tr key={`cat-${cat.id}`}>
                    <td colSpan={3} style={{ background: cat.color, color: "white", padding: "7px 16px", fontSize: 12, fontWeight: 700, letterSpacing: ".6px" }}>
                      {cat.label}
                    </td>
                  </tr>
                  {cat.soins.map((soin, si) => {
                    const entry = findEntry(cat.id, soin);
                    const isEven = si % 2 === 0;
                    return (
                      <tr key={`${cat.id}-${soin}`} style={{ background: isEven ? "white" : "#F9FBFC" }}>
                        <td style={{ padding: "8px 16px", fontSize: 13, color: C.txt, borderBottom: `1px solid ${C.bor}` }}>{soin}</td>
                        {["M", "MS"].map(p => {
                          const checked = entry?.[p] || false;
                          return (
                            <td key={p} onClick={() => toggle(cat.id, soin, p)}
                              style={{ textAlign: "center", borderLeft: `1px solid ${C.bor}`, borderBottom: `1px solid ${C.bor}`, cursor: "pointer", background: checked ? (p === "M" ? "#EBF4FA" : "#E6F2EE") : "transparent", transition: "background .15s" }}>
                              <div style={{ width: 32, height: 32, borderRadius: 6, border: `2px solid ${checked ? (p === "M" ? C.pri : C.acc) : C.bor}`, background: checked ? (p === "M" ? C.pri : C.acc) : "white", display: "flex", alignItems: "center", justifyContent: "center", margin: "auto", cursor: "pointer", transition: "all .15s" }}>
                                {checked && <span style={{ color: "white", fontSize: 16, lineHeight: 1 }}>✓</span>}
                              </div>
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ padding: "12px 16px", borderTop: `1px solid ${C.bor}`, display: "flex", alignItems: "center", gap: 12, background: "#FAFBFC" }}>
          <span style={{ fontSize: 12, color: C.mut }}>Paraphe IDEL :</span>
          <span style={{ fontWeight: 600, color: C.txt, fontSize: 13 }}>{session.prenom} {session.nom}</span>
          <span style={{ fontSize: 12, color: C.mut }}>•  {dateView}</span>
        </div>
      </div>
    </div>
  );
}

// ─── INFOS TAB ────────────────────────────────────────────────────────────────
function InfosTab({ patient }) {
  const fields = [
    ["Nom", patient.nom], ["Prénom", patient.prenom],
    ["Date de naissance", patient.dateNaissance], ["N° Sécurité sociale", patient.nss],
    ["Téléphone", patient.telephone], ["Mutuelle", patient.mutuelle],
    ["Adresse", patient.adresse], ["Médecin traitant", patient.medecin],
    ["Allergies connues", patient.allergies || "Aucune"], ["Notes médicales", patient.notesMed],

  return (
    <div style={{ background: "white", borderRadius: 12, padding: 24, boxShadow: "0 2px 8px rgba(0,0,0,.06)" }}>
      <h3 style={{ color: C.pri, marginTop: 0, fontSize: 15 }}>Informations patient</h3>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        {fields.map(([l, v]) => (
          <div key={l}>
            <div style={{ fontSize: 11, color: C.mut, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".5px" }}>{l}</div>
            <div style={{ fontSize: 14, color: C.txt, marginTop: 2 }}>{v}</div>
          </div>
        ))}
      </div>
    </div>

}

// ─── CONSENTEMENT TAB ─────────────────────────────────────────────────────────
function ConsentTab({ patient }) {
  return (
    <div style={{ background: "white", borderRadius: 12, padding: 24, boxShadow: "0 2px 8px rgba(0,0,0,.06)" }}>
      <h3 style={{ color: C.pri, marginTop: 0, fontSize: 15 }}>Consentement aux soins</h3>
      {patient.consentement
        ? <>
            <div style={{ display: "flex", gap: 8, alignItems: "center", background: C.accL, padding: "10px 14px", borderRadius: 8, marginBottom: 14 }}>
              <span>✅</span><span style={{ color: C.acc, fontWeight: 600, fontSize: 13 }}>Consentement signé le {patient.dateConsentement}</span>
            </div>
            {patient.signature && <img src={patient.signature} alt="Signature" style={{ border: `1px solid ${C.bor}`, borderRadius: 8, maxWidth: 340, display: "block" }} />}
          </>
        : <div style={{ textAlign: "center", padding: 40, color: C.mut }}><div style={{ fontSize: 36, marginBottom: 10 }}>⚠️</div><p>Aucun consentement enregistré.</p></div>
      }

  );
}

// ─── ARCHIVES ─────────────────────────────────────────────────────────────────
function Archives({ archived, soins, onRestore, onExport }) {
  return (
    <div>
      <h2 style={{ color: C.pri, marginBottom: 18 }}>Archives patients</h2>
      {archived.length === 0
        ? <div style={{ textAlign: "center", padding: 60, color: C.mut }}><div style={{ fontSize: 44 }}>📁</div><p>Aucun patient archivé.</p></div>
        : <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {archived.map(p => (
              <div key={p.id} style={{ background: "white", borderRadius: 12, padding: "14px 18px", boxShadow: "0 2px 8px rgba(0,0,0,.06)", display: "flex", alignItems: "center", justifyContent: "space-between", opacity: .85 }}>
                <div>
                  <span style={{ fontWeight: 700, color: C.txt }}>{p.prenom} {p.nom}</span>
                  <span style={{ marginLeft: 10, fontSize: 12, color: C.mut }}>Archivé le {p.archivedAt}</span>
                  <span style={{ marginLeft: 8, fontSize: 12, color: C.mut }}>• {soins.filter(s => s.patientId === p.id).length} actes enregistrés</span>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn variant="outline" sm onClick={() => onExport(p)}>📄 PDF</Btn>
                  <Btn variant="accent" sm onClick={() => { if (window.confirm("Restaurer ?")) onRestore(p); }}>Restaurer</Btn>
                </div>
              </div>

}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function Admin({ users, onAdd, onDelete }) {
  const [form, setForm] = useState({ nom: "", prenom: "", login: "", password: "", role: "infirmier" });
  const [errors, setErrors] = useState({});
  function up(k, v) { setForm(p => ({ ...p, [k]: v })); }

  function save() {
    const e = {};
    if (!form.nom.trim()) e.nom = "Requis";
    if (!form.prenom.trim()) e.prenom = "Requis";
    if (!form.login.trim()) e.login = "Requis";
    if (form.password.length < 6) e.password = "6 caractères min.";
    if (users.find(u => u.login === form.login)) e.login = "Déjà utilisé";
    if (Object.keys(e).length) { setErrors(e); return; }
    onAdd({ ...form, id: Date.now().toString() });
    setForm({ nom: "", prenom: "", login: "", password: "", role: "infirmier" });
    setErrors({});
  }

  return (
    <div>
      <h2 style={{ color: C.pri, marginBottom: 20 }}>Administration – Utilisateurs</h2>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22 }}>
        <div style={{ background: "white", borderRadius: 12, padding: 22, boxShadow: "0 2px 8px rgba(0,0,0,.06)" }}>
          <h3 style={{ color: C.pri, marginTop: 0, fontSize: 15 }}>Créer un utilisateur</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <Field label="Nom" error={errors.nom}><Inp value={form.nom} onChange={e => up("nom", e.target.value)} /></Field>
              <Field label="Prénom" error={errors.prenom}><Inp value={form.prenom} onChange={e => up("prenom", e.target.value)} /></Field>
            </div>
            <Field label="Identifiant" error={errors.login}><Inp value={form.login} onChange={e => up("login", e.target.value)} /></Field>
            <Field label="Mot de passe" error={errors.password}><Inp type="password" value={form.password} onChange={e => up("password", e.target.value)} /></Field>
            <Field label="Rôle">
              <select value={form.role} onChange={e => up("role", e.target.value)} style={{ width: "100%", padding: "9px 12px", borderRadius: 7, border: `1.5px solid ${C.bor}`, fontSize: 14 }}>
                <option value="infirmier">Infirmier(e) remplaçant(e)</option>
                <option value="admin">Administrateur</option>
              </select>
            </Field>
            <Btn onClick={save}>Créer l'utilisateur</Btn>
          </div>
        </div>
        <div style={{ background: "white", borderRadius: 12, padding: 22, boxShadow: "0 2px 8px rgba(0,0,0,.06)" }}>
          <h3 style={{ color: C.pri, marginTop: 0, fontSize: 15 }}>Comptes existants ({users.length})</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {users.map(u => (
              <div key={u.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 12px", borderRadius: 8, border: `1px solid ${C.bor}` }}>
                <div>
                  <span style={{ fontWeight: 600, color: C.txt, fontSize: 13 }}>{u.prenom} {u.nom}</span>
                  <span style={{ marginLeft: 8, fontSize: 11, color: C.mut }}>@{u.login}</span>
                  <span style={{ marginLeft: 8, fontSize: 10, padding: "2px 8px", borderRadius: 10, background: u.role === "admin" ? C.warnL : C.priL, color: u.role === "admin" ? C.warn : C.pri, fontWeight: 700 }}>{u.role}</span>
                </div>
                {u.id !== "admin" && (
                  <button onClick={() => { if (window.confirm("Supprimer ?")) onDelete(u.id); }} style={{ background: "none", border: "none", cursor: "pointer", color: C.dan, fontSize: 16 }}>✕</button>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MODAL NOUVEAU PATIENT ────────────────────────────────────────────────────
function ModalNouveauPatient({ onSave, onClose }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ nom: "", prenom: "", dateNaissance: "", nss: "", telephone: "", adresse: "", medecin: "", allergies: "", mutuelle: "", notesMed: "" });
  const [signature, setSignature] = useState(null);
  const [errors, setErrors] = useState({});

  function up(k, v) { setForm(p => ({ ...p, [k]: v })); }

  function next() {
    if (step === 1) {
      const e = {};
      if (!form.nom.trim()) e.nom = "Requis";
      if (!form.prenom.trim()) e.prenom = "Requis";
      if (Object.keys(e).length) { setErrors(e); return; }
      setErrors({});
    }
    setStep(s => s + 1);
  }

  function save() {
    if (!signature) { alert("La signature du patient est requise pour attester son consentement."); return; }
    onSave({ id: Date.now().toString(), ...form, consentement: true, signature, dateConsentement: new Date().toLocaleDateString("fr-FR") });
  }

  const steps = ["Informations", "Consentement & Signature"];

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div style={{ background: "white", borderRadius: 16, padding: 32, width: "100%", maxWidth: 560, maxHeight: "92vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,.25)" }}>
        {/* Étapes */}
        <div style={{ display: "flex", gap: 0, marginBottom: 26 }}>
          {steps.map((l, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: step > i + 1 ? C.acc : step === i + 1 ? C.pri : C.bor, color: step >= i + 1 ? "white" : C.mut, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, marginBottom: 5 }}>
                {step > i + 1 ? "✓" : i + 1}
              </div>
              <div style={{ fontSize: 11, color: step === i + 1 ? C.pri : C.mut, fontWeight: step === i + 1 ? 700 : 400, textAlign: "center" }}>{l}</div>
            </div>
          ))}
        </div>

        {step === 1 && (
          <>
            <h3 style={{ color: C.pri, marginTop: 0, fontSize: 15 }}>Informations patient</h3>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Field label="Nom *" error={errors.nom}><Inp value={form.nom} onChange={e => up("nom", e.target.value)} /></Field>
              <Field label="Prénom *" error={errors.prenom}><Inp value={form.prenom} onChange={e => up("prenom", e.target.value)} /></Field>
              <Field label="Date de naissance"><Inp type="date" value={form.dateNaissance} onChange={e => up("dateNaissance", e.target.value)} /></Field>
              <Field label="N° Sécurité sociale"><Inp value={form.nss} onChange={e => up("nss", e.target.value)} placeholder="1 80 01 75 123 456 78" /></Field>
              <Field label="Téléphone"><Inp type="tel" value={form.telephone} onChange={e => up("telephone", e.target.value)} /></Field>
              <Field label="Mutuelle"><Inp value={form.mutuelle} onChange={e => up("mutuelle", e.target.value)} /></Field>
              <div style={{ gridColumn: "1/-1" }}><Field label="Adresse"><Inp value={form.adresse} onChange={e => up("adresse", e.target.value)} /></Field></div>
              <Field label="Médecin traitant"><Inp value={form.medecin} onChange={e => up("medecin", e.target.value)} /></Field>
              <Field label="Allergies connues"><Inp value={form.allergies} onChange={e => up("allergies", e.target.value)} placeholder="Aucune" /></Field>
              <div style={{ gridColumn: "1/-1" }}><Field label="Notes médicales"><Inp rows={2} value={form.notesMed} onChange={e => up("notesMed", e.target.value)} /></Field></div>
            </div>
          </>
        )}

        {step === 2 && (
          <>
            <h3 style={{ color: C.pri, marginTop: 0, fontSize: 15 }}>Consentement éclairé aux soins</h3>
            <div style={{ background: C.neu, borderRadius: 8, padding: 14, marginBottom: 18, fontSize: 13, color: C.txt, lineHeight: 1.6 }}>
              <p style={{ margin: "0 0 8px" }}><strong>Je soussigné(e) {form.prenom} {form.nom}</strong> atteste avoir été informé(e) par l'infirmière libérale des soins infirmiers qui me seront prodigués à mon domicile.</p>
              <p style={{ margin: "0 0 8px" }}>J'ai reçu les informations nécessaires, j'ai pu poser mes questions et j'accepte librement la réalisation de ces soins.</p>
              <p style={{ margin: 0, fontSize: 12, color: C.mut }}>Date : {new Date().toLocaleDateString("fr-FR")}</p>
            </div>
            {!signature
              ? <SignatureCanvas onSave={setSignature} onCancel={() => {}} />
              : <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, background: C.accL, padding: "9px 14px", borderRadius: 7, marginBottom: 10 }}>
                    <span>✅</span><span style={{ color: C.acc, fontWeight: 600, fontSize: 13 }}>Signature enregistrée</span>
                    <Btn variant="ghost" sm onClick={() => setSignature(null)}>Modifier</Btn>
                  </div>
                  <img src={signature} alt="Signature" style={{ border: `1px solid ${C.bor}`, borderRadius: 8, maxWidth: 300, display: "block" }} />
                </div>
            }
          </>
        )}

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 22, paddingTop: 16, borderTop: `1px solid ${C.bor}` }}>
          <Btn variant="ghost" onClick={step === 1 ? onClose : () => setStep(s => s - 1)}>
            {step === 1 ? "Annuler" : "← Précédent"}
          </Btn>
          {step < 2 ? <Btn onClick={next}>Suivant →</Btn> : <Btn variant="accent" onClick={save}>✓ Créer le patient</Btn>}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
